name: "Bug report"
description: "Something else broke. CLI crashed, weird output, install failure, doc inconsistency, etc."
title: "[bug] <one-line summary>"
labels:
  - "bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. If your issue is specifically about (a) a library-migration hint, please use the *registry* template; (b) Layer 0/1 producing a wrong fix, please use the *layer-0 false-positive* template — those have more targeted fields.

  - type: input
    id: tsfix-version
    attributes:
      label: tsfix version
      description: "`tsfix --help` prints the version, or check `node_modules/@shipispec/tsfix/package.json`."
      placeholder: "0.6.2"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "v22.22.2"
    validations:
      required: true

  - type: input
    id: typescript-version
    attributes:
      label: TypeScript version (in your workspace's node_modules)
      placeholder: "5.9.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: The exact command you ran
      render: bash
      placeholder: "npx @shipispec/tsfix --workspace . --llm --llm-budget-usd 0.50"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: Paste the full tsfix output. Add `--verbose` if it's not already there.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction (if not obvious from the command above)
      description: Self-contained workspace, or a `git clone` + steps.

  - type: checkboxes
    id: layer
    attributes:
      label: Which layers ran?
      options:
        - label: Layer 0/1 (deterministic LSP — the default)
        - label: Layer 2 (LLM mend — `--llm`)
        - label: Layer 4 (stub-and-continue — `runMendLoop({stubOnFailure: true})`)
